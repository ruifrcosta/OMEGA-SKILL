    // Magnet component wrapping an element for mouse-following magnetic effect
    function Magnet({ children, strength = 3, padding = 150 }) {
      const ref = useRef(null);
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      
      const springX = useSpring(x, { stiffness: 120, damping: 20 });
      const springY = useSpring(y, { stiffness: 120, damping: 20 });

      const handleMouseMove = (e) => {
        if (!ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const distanceX = e.clientX - centerX;
        const distanceY = e.clientY - centerY;
        const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

        if (distance < padding) {
          x.set(distanceX / strength);
          y.set(distanceY / strength);
        } else {
          x.set(0);
          y.set(0);
        }
      };

      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
      };

      useEffect(() => {
        window.addEventListener('mousemove', handleMouseMove);
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
        };
      }, []);

      return (
        <motion.div
          ref={ref}
          style={{ x: springX, y: springY, willChange: 'transform' }}
          onMouseLeave={handleMouseLeave}
          className="relative inline-block"
        >
          {children}
        </motion.div>
      );
    }

    // FadeIn entrance motion wrapper
    function FadeIn({ children, delay = 0, duration = 0.7, x = 0, y = 30 }) {
      return (
        <motion.div
          initial={{ opacity: 0, x, y }}
          whileInView={{ opacity: 1, x: 0, y: 0 }}
          viewport={{ once: true, margin: "50px", amount: 0 }}
          transition={{ duration, delay, ease: [0.25, 0.1, 0.25, 1] }}
        >
          {children}
        </motion.div>
      );
    }

    // Horizontal Scrolling Marquees linked to page scroll position
    function MarqueeRow({ images, direction = 'left' }) {
      const rowRef = useRef(null);
      const { scrollY } = useScroll();
      const [offsetX, setOffsetX] = useState(0);

      useEffect(() => {
        const updateOffset = () => {
          if (!rowRef.current) return;
          const rect = rowRef.current.getBoundingClientRect();
          const isVisible = rect.top < window.innerHeight && rect.bottom > 0;
          
          if (isVisible) {
            const relativeScroll = window.scrollY - (rect.top + window.scrollY - window.innerHeight);
            const move = relativeScroll * 0.3;
            setOffsetX(direction === 'right' ? move - 200 : -(move - 200));
          }
        };

        const unsubscribe = scrollY.onChange(updateOffset);
        return () => unsubscribe();
      }, [scrollY, direction]);

      // Triple images list for seamlessness
      const tripleImages = [...images, ...images, ...images];

      return (
        <div ref={rowRef} className="w-full overflow-hidden py-1">
          <motion.div 
            className="flex gap-3 whitespace-nowrap will-change-transform"
            style={{ 
              transform: `translate3d(${offsetX}px, 0, 0)`
            }}
          >
            {tripleImages.map((src, idx) => (
              <img
                key={idx}
                src={src}
                className="w-[280px] h-[180px] sm:w-[420px] sm:h-[270px] rounded-2xl object-cover shrink-0 select-none"
                loading="lazy"
                alt={`Tile ${idx}`}
              />
            ))}
          </motion.div>
        </div>
      );
    }

    // Character-by-character scroll opacity text reveal
    function ScrollRevealText({ text, className }) {
      const targetRef = useRef(null);
      const { scrollYProgress } = useScroll({
        target: targetRef,
        offset: ["start 0.8", "end 0.2"]
      });

      const chars = text.split("");
      const total = chars.length;

      return (
        <p ref={targetRef} className={`flex flex-wrap justify-center leading-relaxed ${className}`}>
          {chars.map((char, i) => {
            const progress = i / total;
            const start = progress - 0.1;
            const end = progress + 0.05;
            const opacity = useTransform(scrollYProgress, [Math.max(0, start), Math.min(1, end)], [0.2, 1]);

            return (
              <motion.span key={i} style={{ opacity }} className="inline-block whitespace-pre">
                {char}
              </motion.span>
            );
          })}
        </p>
      );
    }
