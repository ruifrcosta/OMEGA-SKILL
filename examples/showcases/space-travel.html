    // Custom requestAnimationFrame-based fading video player
    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafIdRef = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = (targetOpacity, duration) => {
        if (!videoRef.current) return;
        
        const video = videoRef.current;
        const startOpacity = parseFloat(video.style.opacity || 0);
        const startTime = performance.now();

        const animate = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const currentOpacity = startOpacity + (targetOpacity - startOpacity) * progress;
          
          if (videoRef.current) {
            videoRef.current.style.opacity = currentOpacity;
          }

          if (progress < 1) {
            rafIdRef.current = requestAnimationFrame(animate);
          }
        };

        if (rafIdRef.current) {
          cancelAnimationFrame(rafIdRef.current);
        }
        rafIdRef.current = requestAnimationFrame(animate);
      };

      const handleLoadedData = () => {
        if (!videoRef.current) return;
        videoRef.current.style.opacity = 0;
        videoRef.current.play().then(() => {
          fadeTo(1, 500);
        }).catch(err => console.log("Auto-play blocked or interrupted:", err));
      };

      const handleTimeUpdate = () => {
        if (!videoRef.current) return;
        const video = videoRef.current;
        const timeLeft = video.duration - video.currentTime;

        if (!fadingOutRef.current && timeLeft <= 0.55 && timeLeft > 0) {
          fadingOutRef.current = true;
          fadeTo(0, 500);
        }
      };

      const handleEnded = () => {
        if (!videoRef.current) return;
        videoRef.current.style.opacity = 0;
        
        setTimeout(() => {
          if (videoRef.current) {
            videoRef.current.currentTime = 0;
            videoRef.current.play().then(() => {
              fadingOutRef.current = false;
              fadeTo(1, 500);
            });
          }
        }, 100);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (video) {
          video.addEventListener('loadeddata', handleLoadedData);
          video.addEventListener('timeupdate', handleTimeUpdate);
          video.addEventListener('ended', handleEnded);
        }

        return () => {
          if (video) {
            video.removeEventListener('loadeddata', handleLoadedData);
            video.removeEventListener('timeupdate', handleTimeUpdate);
            video.removeEventListener('ended', handleEnded);
          }
          if (rafIdRef.current) {
            cancelAnimationFrame(rafIdRef.current);
          }
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ ...style, opacity: 0 }}
        />
      );
    }

    // BlurText Component: Staggered word-by-word enter animation
    function BlurText({ text }) {
      const containerRef = useRef(null);
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsVisible(true);
          }
        }, { threshold: 0.1 });

        if (containerRef.current) {
          observer.observe(containerRef.current);
        }

        return () => {
          if (containerRef.current) observer.unobserve(containerRef.current);
        };
      }, []);

      const words = text.split(" ");

      return (
        <div 
          ref={containerRef}
          className="flex flex-wrap justify-center"
          style={{ rowGap: '0.1em' }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              className="inline-block"
              style={{ marginRight: '0.28em' }}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={isVisible ? {
                filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0]
              } : {}}
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: 'easeOut',
                delay: i * 0.1
              }}
            >
              {word}
            </motion.span>
          ))}
        </div>
      );
    }
