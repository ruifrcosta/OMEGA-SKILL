  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, useScroll, useTransform, AnimatePresence } = window.Motion;

    // WordsPullUp Component
    function WordsPullUp({ text, showAsterisk, className }) {
      const containerRef = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsInView(true);
          }
        }, { threshold: 0.1, once: true });

        if (containerRef.current) {
          observer.observe(containerRef.current);
        }
        return () => {
          if (containerRef.current) observer.unobserve(containerRef.current);
        };
      }, []);

      const words = text.split(" ");

      return (
        <p 
          ref={containerRef}
          className={`flex flex-wrap justify-center row-gap-1 ${className}`}
        >
          {words.map((word, i) => {
            const isLast = i === words.length - 1;
            return (
              <span key={i} className="overflow-hidden inline-block relative py-1" style={{ marginRight: '0.28em' }}>
                <motion.span
                  className="inline-block relative"
                  initial={{ y: "100%" }}
                  animate={isInView ? { y: 0 } : {}}
                  transition={{ duration: 0.7, ease: [0.16, 1, 0.3, 1], delay: i * 0.08 }}
                >
                  {word}
                  {isLast && showAsterisk && (
                    <span className="absolute top-[0.1em] -right-[0.3em] text-[0.31em] font-light font-body">
                      *
                    </span>
                  )}
                </motion.span>
              </span>
            );
          })}
        </p>
      );
    }

    // WordsPullUpMultiStyle Component
    function WordsPullUpMultiStyle({ segments, className }) {
      const containerRef = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsInView(true);
          }
        }, { threshold: 0.1, once: true });

        if (containerRef.current) {
          observer.observe(containerRef.current);
        }
        return () => {
          if (containerRef.current) observer.unobserve(containerRef.current);
        };
      }, []);

      // Build flat word map with associated styles
      let wordIndex = 0;
      const parsedWords = segments.flatMap(seg => {
        return seg.text.split(" ").map(word => ({
          word,
          className: seg.className,
          globalIdx: wordIndex++
        }));
      });

      return (
        <div ref={containerRef} className={`inline-flex flex-wrap justify-center ${className}`}>
          {parsedWords.map(({ word, className: wordClass, globalIdx }) => (
            <span key={globalIdx} className="overflow-hidden inline-block py-1" style={{ marginRight: '0.28em' }}>
              <motion.span
                className={`inline-block ${wordClass}`}
                initial={{ y: "100%" }}
                animate={isInView ? { y: 0 } : {}}
                transition={{ duration: 0.7, ease: [0.16, 1, 0.3, 1], delay: globalIdx * 0.08 }}
              >
                {word}
              </motion.span>
            </span>
          ))}
        </div>
      );
    }

    // Animated scroll reveal paragraph character by character
    function ScrollRevealParagraph({ text, className }) {
      const targetRef = useRef(null);
      const { scrollYProgress } = useScroll({
        target: targetRef,
        offset: ["start 0.8", "end 0.2"]
      });

      const chars = text.split("");
      const totalChars = chars.length;

      return (
        <p ref={targetRef} className={`flex flex-wrap justify-center leading-relaxed ${className}`}>
          {chars.map((char, index) => {
            const charProgress = index / totalChars;
            const start = charProgress - 0.1;
            const end = charProgress + 0.05;
            
            // Map scroll opacity between 0.2 and 1
            const opacity = useTransform(scrollYProgress, [Math.max(0, start), Math.min(1, end)], [0.2, 1]);

            return (
              <motion.span key={index} style={{ opacity }} className="inline-block whitespace-pre">
                {char}
              </motion.span>
            );
          })}
        </p>
      );
    }
